<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | gekko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .thanks-wrap {
      min-height: calc(100vh - var(--nav-h));
      display: flex; align-items: center; justify-content: center;
      padding: var(--pad-x);
    }
    .thanks-inner { text-align: center; max-width: 480px; }
    .thanks-icon {
      width: 56px; height: 56px; margin: 0 auto 32px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .thanks-icon svg { width: 28px; height: 28px; stroke: var(--text); fill: none; stroke-width: 1.5; }
    .thanks-title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700; letter-spacing: -.02em; color: var(--text);
      margin-bottom: 16px;
    }
    .thanks-body { font-size: .9rem; color: var(--muted); line-height: 2; margin-bottom: 48px; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">gekko</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-mobile" id="navMobile">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="works.html">Works</a>
    <a href="contact.html">Contact</a>
  </div>

  <main>
    <div class="thanks-wrap">
      <div class="thanks-inner">
        <div class="thanks-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 class="thanks-title">送信完了</h1>
        <p class="thanks-body">
          お問い合わせありがとうございます。<br>
          内容を確認後、折り返しご連絡いたします。
        </p>
        <a href="index.html" class="btn btn-outline">
          トップへ戻る
          <svg viewBox="0 0 16 16"><line x1="2" y1="8" x2="14" y2="8"/><polyline points="9,3 14,8 9,13"/></svg>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <a href="index.html" class="footer-logo">gekko</a>
    <ul class="footer-nav">
      <li><a href="about.html">About</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <span class="footer-copy">&copy; 2026 gekko &nbsp;·&nbsp; Built with Claude Code</span>
  </footer>

  <script>
    const toggle = document.getElementById('navToggle');
    const mobile = document.getElementById('navMobile');
    toggle.addEventListener('click', () => { mobile.classList.toggle('open'); toggle.classList.toggle('open'); });
    mobile.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { mobile.classList.remove('open'); toggle.classList.remove('open'); }));
  </script>
</body>
</html>
